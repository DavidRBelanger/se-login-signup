<!DOCTYPE html>
<html lang="en">

<!--
    • Display Text: “First Name” and a field for user to input their first name.
    • Display text: “Last Name” and a field for user to input their last name.
    • Display Text: “User ID” and a field for user to input their user id.
    • Display text: “Password” and a field for user to input their password.
    • Submit Button.
    • Link to “Login” page.
-->
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="login-container">
        <h2>Sign Up</h2>
        <h3>First Name</h3>
        <input type="text" placeholder="name...">
        <h3>Last Name</h3>
        <input type="text" placeholder="name...">
        <h3>User ID</h3>
        <input type="text" placeholder="user id...">
        <h3>Password</h3>
        <input type="password" placeholder="password...">
        <button type="submit">Sign Up</button>
        <a href="login.html">Login</a>
    </div>
</html>
